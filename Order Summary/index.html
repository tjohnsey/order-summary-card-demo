<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Order Summary</title>
    <link rel="icon" href="./media/favicon-32x32.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Red+Hat+Display:ital,wght@0,500;0,700;0,900;1,500;1,700;1,900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main>
      <div class="card-container">
        <div class="card">
          <img
            class="head-img"
            src="./media/illustration-hero.svg"
            alt="woman dancing with headphones on"
          />
          <div class="order">
            <h2>Order Summary</h2>
            <p class="text">
              You can now listen to millions od songs, audiobooks, and podcasts
              on any device anywhere you like!
            </p>
            <div class="plan">
              <div class="plan-info">
                <img src="./media/icon-music.svg" alt="" />
                <div class="price">
                  <p class="annual">Annual Plan</p>
                  <p class="cost">$59.99/year</p>
                </div>
              </div>
              <p class="change"><a href="#">Change</a></p>
            </div>
            <button>Proceed to Payment</button>
            <p class="cancel">Cancel Order</p>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
